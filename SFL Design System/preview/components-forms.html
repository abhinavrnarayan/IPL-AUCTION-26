<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap:10px">
  <div class="col" style="gap:4px">
    <label style="font-family:var(--font-body);font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:0.08em">Room code</label>
    <input value="AB12CD" style="font-family:var(--font-mono);background:var(--bg-1);border:1px solid var(--panel-border);border-radius:6px;padding:10px 12px;color:var(--fg1);font-size:14px;letter-spacing:0.1em"/>
  </div>
  <div class="row" style="gap:10px">
    <div class="col" style="gap:4px;flex:1">
      <label style="font-family:var(--font-body);font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:0.08em">Purse</label>
      <select style="font-family:var(--font-body);background:var(--bg-1);border:1px solid var(--panel-border);border-radius:6px;padding:9px 12px;color:var(--fg1);font-size:13px">
        <option>₹150 Cr</option>
      </select>
    </div>
    <div class="col" style="gap:4px;flex:1">
      <label style="font-family:var(--font-body);font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:0.08em">Bid timer</label>
      <select style="font-family:var(--font-body);background:var(--bg-1);border:1px solid var(--panel-border);border-radius:6px;padding:9px 12px;color:var(--fg1);font-size:13px">
        <option>20 seconds</option>
      </select>
    </div>
  </div>
  <div style="background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.3);border-radius:8px;padding:10px 12px;font-family:var(--font-body);font-size:13px;color:var(--danger)">Bidding time has ended for this player.</div>
</div>
</body></html>
