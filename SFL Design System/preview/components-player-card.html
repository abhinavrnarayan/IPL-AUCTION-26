<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);border-radius:14px;padding:16px">
  <div class="row" style="justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-family:var(--font-body);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--primary-strong)">On the block</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--fg1);margin-top:6px">Jasprit Bumrah</div>
      <div style="font-family:var(--font-body);font-size:13px;color:var(--subtle);margin-top:2px">Mumbai Indians</div>
    </div>
    <div class="row" style="gap:6px">
      <span style="font-family:var(--font-body);font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel);border:1px solid var(--panel-border);color:var(--fg2)">Bowler</span>
      <span style="font-family:var(--font-body);font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel);border:1px solid var(--panel-border);color:var(--fg2)">India</span>
      <span style="font-family:var(--font-body);font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--gold);font-weight:600">Base ₹2 Cr</span>
    </div>
  </div>
  <div class="row" style="gap:10px;margin-top:14px">
    <div style="flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--panel-border-soft);border-radius:10px;padding:10px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--fg1)">₹18.5 Cr</div>
      <div style="font-family:var(--font-body);font-size:11px;color:var(--subtle);margin-top:2px">Current bid</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--panel-border-soft);border-radius:10px;padding:10px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--fg1)">MI</div>
      <div style="font-family:var(--font-body);font-size:11px;color:var(--subtle);margin-top:2px">Mumbai Indians</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--panel-border-soft);border-radius:10px;padding:10px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--fg1)">AVAILABLE</div>
      <div style="font-family:var(--font-body);font-size:11px;color:var(--subtle);margin-top:2px">Status</div>
    </div>
  </div>
</div>
</body></html>
