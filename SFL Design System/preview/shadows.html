<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="row" style="gap:18px;align-items:stretch">
  <div style="flex:1;background:var(--bg-1);border:1px solid var(--panel-border);border-radius:14px;padding:16px;box-shadow:var(--sh-sm)">
    <div class="chip" style="margin-bottom:10px">--sh-sm</div>
    <div style="color:var(--fg2);font-size:12px">Subtle ground — inputs, dropdowns</div>
  </div>
  <div style="flex:1;background:var(--bg-1);border:1px solid var(--panel-border);border-radius:14px;padding:16px;box-shadow:var(--sh-md)">
    <div class="chip" style="margin-bottom:10px">--sh-md</div>
    <div style="color:var(--fg2);font-size:12px">Default card lift</div>
  </div>
  <div style="flex:1;background:var(--bg-1);border:1px solid var(--panel-border);border-radius:14px;padding:16px;box-shadow:0 16px 40px rgba(99,102,241,0.16)">
    <div class="chip" style="margin-bottom:10px">indigo hover</div>
    <div style="color:var(--fg2);font-size:12px">Card :hover — tinted shadow</div>
  </div>
  <div style="flex:1;background:var(--bg-1);border:2px solid var(--primary-strong);border-radius:14px;padding:16px;box-shadow:0 0 0 2px rgba(129,140,248,0.95), 0 0 24px rgba(99,102,241,0.35)">
    <div class="chip" style="margin-bottom:10px">focus ring</div>
    <div style="color:var(--fg2);font-size:12px">AI-highlighted bid</div>
  </div>
</div>
</body></html>
