<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="row" style="gap:18px;align-items:flex-end">
  <div class="col" style="gap:6px"><div style="width:4px;height:4px;background:var(--primary)"></div><div class="chip">--sp-1 · 4</div></div>
  <div class="col" style="gap:6px"><div style="width:8px;height:8px;background:var(--primary)"></div><div class="chip">--sp-2 · 8</div></div>
  <div class="col" style="gap:6px"><div style="width:12px;height:12px;background:var(--primary)"></div><div class="chip">--sp-3 · 12</div></div>
  <div class="col" style="gap:6px"><div style="width:16px;height:16px;background:var(--primary)"></div><div class="chip">--sp-4 · 16</div></div>
  <div class="col" style="gap:6px"><div style="width:24px;height:24px;background:var(--primary)"></div><div class="chip">--sp-5 · 24</div></div>
  <div class="col" style="gap:6px"><div style="width:32px;height:32px;background:var(--primary)"></div><div class="chip">--sp-6 · 32</div></div>
  <div class="col" style="gap:6px"><div style="width:48px;height:48px;background:var(--primary)"></div><div class="chip">--sp-8 · 48</div></div>
</div>
<div style="margin-top:18px" class="row">
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">4</div>
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">6</div>
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">10</div>
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">14</div>
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">20</div>
  <div style="width:60px;height:40px;background:var(--panel);border:1px solid var(--panel-border);border-radius:999px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg2)">pill</div>
</div>
</body></html>
