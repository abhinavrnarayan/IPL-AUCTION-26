<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap:12px">
  <div class="row" style="align-items:center;gap:10px">
    <button style="font-family:var(--font-body);font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;background:var(--primary);color:#fff;border:none;cursor:pointer;box-shadow:0 8px 20px rgba(99,102,241,0.3)">Open lobby</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;background:transparent;color:var(--fg1);border:1px solid var(--panel-border);cursor:pointer">Sign in</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;background:var(--panel);color:var(--fg1);border:1px solid var(--panel-border);cursor:pointer">Create account</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px;background:var(--danger-soft);color:var(--danger);border:1px solid rgba(244,63,94,0.3);cursor:pointer">Confirm drop</button>
  </div>
  <div class="row" style="align-items:center;gap:10px">
    <button style="font-family:var(--font-body);font-weight:600;font-size:13px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--fg1);border:1px solid var(--panel-border)">+₹25 L</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:13px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--fg1);border:2px solid var(--primary-strong);box-shadow:0 0 0 2px rgba(129,140,248,0.5), 0 0 24px rgba(99,102,241,0.35)">+₹50 L</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:13px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--fg1);border:1px solid var(--panel-border)">+₹1 Cr</button>
    <button style="font-family:var(--font-body);font-weight:600;font-size:13px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--disabled);border:1px solid var(--panel-border);cursor:not-allowed">+₹2 Cr</button>
  </div>
  <div class="label-row">Primary · Ghost · Secondary · Danger · Increment · <span style="color:var(--primary-strong)">AI-highlighted</span> · Disabled</div>
</div>
</body></html>
