<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap:12px">
  <div class="col" style="gap:6px">
    <div style="height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden">
      <div style="height:100%;width:72%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:999px"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-family:var(--font-body);font-size:11px;color:var(--subtle)"><span>Live timer</span><strong style="color:var(--fg1);font-family:var(--font-mono)">14s</strong></div>
  </div>
  <div class="col" style="gap:6px">
    <div style="height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden">
      <div style="height:100%;width:28%;background:linear-gradient(90deg,#f59e0b,#fbbf24);border-radius:999px;box-shadow:0 0 10px rgba(245,158,11,0.45)"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-family:var(--font-body);font-size:11px;color:var(--subtle)"><span>Live timer</span><strong style="color:var(--warning);font-family:var(--font-mono)">6s</strong></div>
  </div>
  <div class="col" style="gap:6px">
    <div style="height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden">
      <div style="height:100%;width:9%;background:linear-gradient(90deg,#f43f5e,#fb7185);border-radius:999px;box-shadow:0 0 14px rgba(244,63,94,0.6)"></div>
    </div>
    <div class="row" style="justify-content:space-between;font-family:var(--font-body);font-size:11px;color:var(--subtle)"><span>Live timer</span><strong style="color:var(--danger);font-family:var(--font-mono)">2s</strong></div>
  </div>
</div>
</body></html>
