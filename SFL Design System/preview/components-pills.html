<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap:10px">
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--panel-border);color:var(--fg2)">All-rounder</span>
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--panel-border);color:var(--fg2)">India</span>
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--gold);font-weight:600">Base ₹2 Cr</span>
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:var(--success);font-weight:600">Leading</span>
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.28);color:var(--gold)">Auction complete</span>
    <span style="font-family:var(--font-body);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--panel-border);color:var(--subtle)">Soon</span>
  </div>
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.02em;padding:3px 8px;border-radius:4px;background:var(--primary);color:#fff">MI</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--accent);color:#0b0d14">CSK</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--danger);color:#fff">RCB</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.12em;padding:2px 7px;border-radius:4px;background:var(--ball-red);color:#fff">SOLD</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.12em;padding:2px 7px;border-radius:4px;background:var(--panel);border:1px solid var(--panel-border);color:var(--subtle)">UNSOLD</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.12em;padding:2px 7px;border-radius:4px;background:var(--success-soft);color:var(--success);border:1px solid rgba(16,185,129,0.3)">LIVE</span>
  </div>
  <div class="label-row">Pills · Highlight pill · Soon badge · Team short-code · Status chips</div>
</div>
</body></html>
