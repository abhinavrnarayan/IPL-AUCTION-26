<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<table style="width:100%;border-collapse:collapse;font-family:var(--font-body);color:var(--fg1);font-size:13px">
  <tr style="color:var(--subtle);text-align:left;border-bottom:1px solid var(--panel-border)">
    <th style="padding:6px 8px;font-weight:500;width:120px">Token</th>
    <th style="padding:6px 8px;font-weight:500;width:70px">Size</th>
    <th style="padding:6px 8px;font-weight:500">Example</th>
  </tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-display</td><td class="mono" style="padding:8px">clamp(2, 6vw, 3.5rem)</td><td style="padding:8px;font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1.05;letter-spacing:-0.02em">Live auction</td></tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-xl</td><td class="mono" style="padding:8px">1.75rem</td><td style="padding:8px;font-family:var(--font-display);font-weight:700;font-size:28px">On the block</td></tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-lg</td><td class="mono" style="padding:8px">1.35rem</td><td style="padding:8px;font-family:var(--font-display);font-weight:600;font-size:22px">Bid panel</td></tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-base</td><td class="mono" style="padding:8px">1rem</td><td style="padding:8px;font-size:16px">Open lobby</td></tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-sm</td><td class="mono" style="padding:8px">0.85rem</td><td style="padding:8px;font-size:13.6px;color:var(--subtle)">Highest sold prices first.</td></tr>
  <tr><td class="mono" style="padding:8px;color:var(--primary-strong)">--fs-eyebrow</td><td class="mono" style="padding:8px">0.72rem</td><td style="padding:8px;font-size:11.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--primary-strong);font-weight:600">Fantasy auction game</td></tr>
</table>
</body></html>
