[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[secrets]
  # NEXT_PUBLIC_* keys are intentionally embedded in the client bundle
  excluded = ["NEXT_PUBLIC_SUPABASE_URL", "NEXT_PUBLIC_SUPABASE_ANON_KEY", "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY", "NEXT_PUBLIC_APP_URL"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-term cache for immutable Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML pages (revalidated server-side)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options    = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy    = "strict-origin-when-cross-origin"
