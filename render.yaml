services:
  - type: web
    name: ipl-auction
    runtime: node
    region: singapore   # closest to India — change to "ohio" or "frankfurt" to match your Supabase region
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_APP_URL
        sync: false          # set this in Render dashboard
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
